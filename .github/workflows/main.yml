
name: Run World Cup 2026 Predictions and Optimization

on:
  schedule:
    # Se ejecuta cada 3 horas comenzando a las 09:00 UTC
    - cron: '0 9,12,15,18,21 * * *'
  workflow_dispatch:

jobs:
  predict_and_optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Odds and Predict Value
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          # Aquí se ejecutaría el script que compara predicciones vs cuotas reales
          python Prediction_models/predict_wc2026.py --check-value

      - name: Analyze Results and Adjust Weights
        if: github.event.schedule == '0 21 * * *' # Solo al final del día
        run: |
          # Script para analizar aciertos del día y re-ajustar pesos de los modelos
          python Prediction_models/optimize_weights.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add made_predictions/* models/*
          git commit -m "Auto-update: Predictions & Model Optimization" || echo "No changes"
          git push
