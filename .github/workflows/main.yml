
name: Run World Cup 2026 Predictions and Optimization

on:
  schedule:
    - cron: '0 9,12,15,18,21 * * *'
  workflow_dispatch:

jobs:
  predict_and_optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Predictions
        run: python Prediction_models/predict_wc2026.py

      - name: Send Telegram Notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python util_tools/telegram_notify.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update predictions & notifications" || echo "No changes"
          git push
